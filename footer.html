.footer-wrapper {

/* COLUMNS */
.footer-column {

/* ADDRESS */

  font-size: 13px;

  margin: 0;
}

/* -------- MOBILE -------- */
@media (max-width: 768px) {

  .footer-column:nth-child(3) {

  }

  .footer-column {
    border-left: none;
    padding-left: 0;

}
